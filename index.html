
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calculateur EOQ</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
background:#f4f6f9;
margin:40px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

input{
width:100%;
padding:8px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Calculateur EOQ</h1>

<div class="grid">

<div>
<label>Demande annuelle (D)</label>
<input id="demand" type="number">
</div>

<div>
<label>Coût de commande (S)</label>
<input id="orderCost" type="number">
</div>

<div>
<label>Coût de possession par unité (H)</label>
<input id="holdingCost" type="number">
</div>

<div>
<label>Prix unitaire (C)</label>
<input id="unitCost" type="number">
</div>

</div>

<button onclick="calculateEOQ()">Calculer</button>

<div class="result" id="result"></div>

<canvas id="eoqChart"></canvas>

</div>

<script>

let chart;

function calculateEOQ(){

let D = parseFloat(document.getElementById("demand").value)
let S = parseFloat(document.getElementById("orderCost").value)
let H = parseFloat(document.getElementById("holdingCost").value)
let C = parseFloat(document.getElementById("unitCost").value)

let EOQ = Math.sqrt((2*D*S)/H)

document.getElementById("result").innerHTML =
"Quantité économique de commande (EOQ) : " + EOQ.toFixed(2)

generateChart(D,S,H)

}

function generateChart(D,S,H){

let quantities=[]
let totalCosts=[]

for(let Q=10; Q<=1000; Q+=10){

let orderingCost = (D/Q)*S
let holdingCost = (Q/2)*H
let total = orderingCost + holdingCost

quantities.push(Q)
totalCosts.push(total)

}

if(chart){
chart.destroy()
}

let ctx=document.getElementById("eoqChart")

chart=new Chart(ctx,{
type:"line",
data:{
labels:quantities,
datasets:[{
label:"Coût total",
data:totalCosts
}]
},
options:{
responsive:true,
plugins:{
legend:{display:true}
}
}
})

}

</script>

</body>
</html>
